<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Down to Earth Projector</title>
    <style>
      :root {
        --bg-color: #000;
        --text-color: #fff;
        --accent-color: #3b82f6;
        --danger-color: #ef4444;
        --ring-size: 80vh;

        /* Customizable Appearance Variables */
        --timer-size: 24vw;
        --timer-color: #ffffff;
        --timer-font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

        --title-size: 6vh;
        --title-color: rgba(255, 255, 255, 0.8);
        --title-font: system-ui, -apple-system, sans-serif;

        --notes-size: 4.5vh;
        --notes-color: #ffffff;
        --notes-font: system-ui, -apple-system, sans-serif;

        --clock-size: 17vh;
        --clock-color: rgba(255, 255, 255, 0.83);

        --bar-height: 1.5vh; /* Standard talent bar height */
      }

      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg-color);
        color: var(--text-color);
        /* 🧬 Use dvh to account for mobile browser bars */
        height: 100dvh; 
        width: 100vw;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column; 
        align-items: center;
        /* Prevent accidental touch-drag on mobile */
        touch-action: none;
        cursor: default;
      }

      /* Animated Background Layer */
      #bg-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(circle at center, #1e3a8a 0%, #000 70%);
        opacity: 0.6;
        transition: background 1s ease;
      }

      #bg-layer.urgency {
        background: radial-gradient(circle at center, #7f1d1d 0%, #000 70%);
      }

      #bg-layer.overtime {
        background: radial-gradient(circle at center, #991b1b 0%, #310000 70%);
        animation: bg-pulse 2s infinite alternate;
      }

      @keyframes bg-pulse {
        from { opacity: 0.6; }
        to { opacity: 0.9; }
      }


      #title {
        font-size: var(--title-size);
        margin-bottom: 2px; /* Minimal margin to save space */
        color: var(--title-color);
        font-family: var(--title-font);
        text-align: center;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        max-width: 95vw;
        overflow-wrap: break-word;
        flex-shrink: 1; 
        min-height: 0; /* Professional flex-shrink override */
      }

      #label {
        font-size: clamp(20px, 10vw, 15vh);
        font-weight: 1000;
        margin: 0;
        color: var(--danger-color);
        text-shadow: 0 0 40px rgba(239, 68, 68, 0.5);
        flex-shrink: 1;
        min-height: 0;
      }

      #time {
        font-size: var(--timer-size);
        font-weight: 800;
        color: var(--timer-color);
        font-family: var(--timer-font);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
        position: relative;
        z-index: 10;
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        margin: 0;
        line-height: 1;
      }

      #clock {
        font-size: var(--clock-size);
        font-weight: 600;
        color: var(--clock-color);
        font-family: var(--timer-font);
        margin-top: 1.5vh;
        letter-spacing: 0.05em;
        display: none; /* Controlled via settings */
      }

      .timer-symbol {
        display: inline-block;
        transform: translateY(-0.06em); /* Nudge up visually to match digit midline */
        margin: 0 0.01em;
      }

      body.has-notes #time {
        font-size: 14vw; /* Shrunk but visible */
      }

      body.has-notes #title {
        font-size: 4vh; /* Slightly smaller title when notes are active */
      }
      
      /* Horizon Split Transition (Full Screen) */
      #next-item-preview {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        animation: card-reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }

      body.transition-mode #next-item-preview {
        display: flex;
        flex: 1.5; /* Takes upper portion */
        z-index: 100;
        margin-top: -5vh; 
      }

      .next-badge {
        background: var(--accent-color);
        color: #000;
        font-weight: 900;
        font-size: 2.5vh;
        padding: 1vh 3vw;
        border-radius: 100px;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        margin-bottom: 5vh;
        box-shadow: 0 0 4vh rgba(var(--accent-rgb), 0.4);
      }

      .next-title {
        font-size: clamp(60px, 15vw, 20vh);
        font-weight: 1000;
        color: #fff;
        text-align: center;
        line-height: 0.95;
        width: 95vw;
        max-width: 95vw;
        text-shadow: 0 20px 80px rgba(0,0,0,0.8);
        word-wrap: break-word;
      }

      .transition-divider {
        width: 90vw;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        margin: 6vh 0;
        display: none; /* Controlled by body class */
        position: relative;
      }

      body.transition-mode .transition-divider {
        display: block;
      }

      .transition-progress-container {
        position: absolute;
        top: -2px;
        left: 0;
        width: 100%;
        height: 5px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 100px;
        overflow: hidden;
      }

      #transition-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent-color), #fff, var(--accent-color));
        box-shadow: 0 0 3vh var(--accent-color);
        transition: width 0.15s linear;
      }

      body.transition-mode #time {
        position: relative;
        font-size: 14vw !important;
        opacity: 0.9;
        color: var(--danger-color);
        text-shadow: 0 0 40px rgba(239, 68, 68, 0.5);
        margin-top: 0;
        z-index: 101;
        flex: 1; /* Takes lower portion */
        display: flex !important;
        align-items: flex-start;
      }

      body.transition-mode .content-wrapper {
        justify-content: center;
        height: 100vh;
        gap: 0;
      }

      @keyframes card-reveal {
        from { opacity: 0; transform: translateY(40px) scale(0.9); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      body.transition-mode #title,
      body.transition-mode #notes-container,
      body.transition-mode .progress-container,
      body.transition-mode #label,
      body.transition-mode #clock {
        display: none !important;
      }

      @keyframes slide-up {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes stage-entrance {
        0% { 
          opacity: 0; 
          transform: translateY(6vh) scale(0.92);
          filter: blur(10px);
        }
        100% { 
          opacity: 1; 
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      .new-segment-entrance {
        animation: stage-entrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .timer-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
      }

      /* Urgency Pulse (< 60s) */
      #time.pulsing {
        animation: pulse 1s infinite cubic-bezier(0.4, 0, 0.6, 1);
        color: #fca5a5;
      }

      /* Overtime Shake */
      body.shake .content-wrapper {
        animation: shake 0.5s infinite linear;
      }

      #time.overtime {
        color: var(--danger-color);
        text-shadow: 0 0 60px rgba(239, 68, 68, 0.7);
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      @keyframes shake {
        0% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(5px, 5px) rotate(0.5deg); }
        50% { transform: translate(0, 10px) rotate(0deg); }
        75% { transform: translate(-5px, 5px) rotate(-0.5deg); }
        100% { transform: translate(0, 0) rotate(0deg); }
      }

      /* Locked Bottom Talent Bar (Edge-to-Edge Floor) */
      .progress-container {
        width: 100%;
        height: var(--bar-height);
        background: rgba(255, 255, 255, 0.05);
        /* 🛡️ Remove overflow-hidden to allow the marker to "float" above the bar */
        overflow: visible; 
        display: flex;
        justify-content: flex-end;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 1001;
        flex-shrink: 0; 
        position: relative; 
        /* 📱 Professional bottom-safe area handling */
        margin-bottom: constant(safe-area-inset-bottom);
        margin-bottom: env(safe-area-inset-bottom);
      }

      .progress-segment {
        height: 100%;
        transition: width 0.4s linear, opacity 0.3s ease;
        /* 🛡️ Move overflow-hidden here to clip the bar fill */
        overflow: hidden; 
      }

      #segment-green { 
        background: #22c55e;
        box-shadow: -5px 0 15px rgba(34, 197, 94, 0.2);
      }
      #segment-yellow { 
        background: #eab308;
      }
      #segment-red { 
        background: #ef4444;
      }

   

      /* Flashing Animations */
      @keyframes flash-3x {
        0%, 33%, 66%, 100% { opacity: 1; }
        16%, 50%, 83% { opacity: 0; }
      }
      .flashing-3x {
        animation: flash-3x 1.5s ease-in-out;
      }

      @keyframes flash-indefinite {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }
      .flashing-indefinite {
        animation: flash-indefinite 1s infinite alternate ease-in-out;
      }

      @keyframes heartbeat {
        0% { transform: scale(1); }
        14% { transform: scale(1.08); }
        28% { transform: scale(1); }
        42% { transform: scale(1.08); }
        70% { transform: scale(1); }
      }
      .overtime-pulse {
        animation: heartbeat 1.2s infinite ease-in-out !important;
      }

      /* ⚡️ Flash & Shake Signaling */
      @keyframes energetic-shake {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(-4px, -2px); }
        75% { transform: translate(4px, 2px); }
      }

      body.flash-blast {
        background: rgba(255, 255, 255, 0.35) !important;
        transition: background 0.15s ease;
      }

      .flash-active {
        animation: energetic-shake 0.2s infinite !important;
        filter: brightness(1.6) drop-shadow(0 0 20px rgba(255,255,255,0.6)) !important;
        color: #fff !important;
        text-shadow: 0 0 30px rgba(255, 255, 255, 0.8) !important;
        z-index: 9999 !important;
      }

      .notes-flash {
        animation: energetic-shake 0.25s infinite !important;
        background: rgba(255, 255, 255, 0.15) !important;
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.2) !important;
        border-radius: 24px;
      }

      /* Rich Message Styles */
      @keyframes message-pulse {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.05); filter: brightness(1.4); }
      }

      .msg-bold { font-weight: 900 !important; }
      .msg-caps { text-transform: uppercase !important; }
      .msg-flash { animation: message-pulse 0.8s infinite ease-in-out !important; }
      
      body.focus-notes #notes-container {
        opacity: 1 !important;
        display: flex !important;
        transform: scale(1.3) !important;
        z-index: 1000 !important;
        text-shadow: 0 0 30px rgba(0,0,0,0.5);
      }
      
      body.focus-notes #time, 
      body.focus-notes #title,
      body.focus-notes .progress-container {
        opacity: 0.15 !important;
        filter: blur(4px);
        transform: scale(0.9);
      }

      .content-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 0;
        padding: 2vh 0;
        gap: 1.5vh;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* Focus Mode Layout Engine */
      #title, #time, #notes-container { 
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
      }

      body.focus-mode #title, 
      body.focus-mode #time, 
      body.focus-mode #notes-container {
        opacity: 0.4;
        transform: scale(0.7);
      }

      body.focus-mode .focused-item {
        opacity: 1 !important;
        transform: scale(1.15) !important;
        font-weight: 900 !important;
        z-index: 50;
      }
      
      /* Specific orders for Focus Mode */
      body.focus-mode .item-top { order: 1; }
      body.focus-mode .focused-item { order: 2; }
      body.focus-mode .item-bottom { order: 3; }
      
      body.focus-mode.focus-notes .progress-container { display: none !important; }

      #bg-layer.urgency ~ .content-wrapper #progress-bar {
        background: var(--danger-color);
        box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
      }

      #notes-container {
        width: 95vw;
        max-width: 95vw;
        padding: 1vh 0;
        text-align: center;
        opacity: 0;
        display: none;
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        flex-shrink: 1;
        min-height: 0;
      }

      #notes-container.active {
        opacity: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex-grow: 1; /* Use available vertical space */
      }

      #notes-content {
        font-size: var(--notes-size);
        color: var(--notes-color);
        font-family: var(--notes-font);
        font-weight: 500;
        line-height: 1.2;
        margin: 0;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        white-space: pre-wrap; /* Multi-line support */
        width: 100%;
        max-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #notes-label {
        font-size: 1.8vh;
        color: var(--accent-color);
        text-transform: uppercase;
        letter-spacing: 0.2em;
        margin-bottom: 1.5vh;
        font-weight: 800;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="bg-layer"></div>
    
    <div class="content-wrapper">
      <div id="title"></div>
      
      <div class="timer-stack">
        <div id="label"></div>
        <div id="time">00:00</div>
        <div id="clock">00:00:00 AM</div>
      </div>

      <div id="notes-container">
        <p id="notes-content"></p>
      </div>

      <!-- Horizon Split Transition -->
      <div id="next-item-preview">
        <div class="next-badge">Up Next</div>
        <div id="next-title-text" class="next-title">Opening Segment</div>
      </div>

      <div class="transition-divider">
        <div class="transition-progress-container">
          <div id="transition-progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="progress-container">
      <div id="segment-green" class="progress-segment"></div>
      <div id="segment-yellow" class="progress-segment"></div>
      <div id="segment-red" class="progress-segment"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="projector.js"></script>

    <!-- REMOTE PIN OVERLAY (Visible only when remote and unauthenticated) -->
    <div id="remoteAuthOverlay" style="display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; backdrop-filter: blur(20px);">
      <div style="width: 100%; max-width: 320px; background: rgba(59, 130, 246, 0.05); padding: 40px 30px; border-radius: 32px; border: 1px solid rgba(59, 130, 246, 0.1); box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);">
        <div style="font-size: 40px; margin-bottom: 20px;">🔒</div>
        <h2 style="font-size: 20px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; color: #fff;">Talent View Locked</h2>
        <p style="font-size: 13px; color: rgba(255, 255, 255, 0.5); margin-bottom: 24px;">Enter the 4-digit security PIN shown on the host computer.</p>
        
        <input type="text" id="remotePinInput" maxlength="4" placeholder="••••" style="width: 100%; height: 72px; background: rgba(15, 23, 42, 0.5); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 16px; text-align: center; font-size: 32px; font-family: ui-monospace; font-weight: 900; color: white; margin-bottom: 20px; outline: none; transition: border-color 0.3s ease; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);" 
        oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        
        <button id="authSubmitBtn" style="width: 100%; padding: 16px; font-weight: 800; border-radius: 16px; background: #3b82f6; color: white; border: none; cursor: pointer; transition: transform 0.2s ease;">Unlock Projector</button>
      </div>
    </div>
  </body>
</html>
